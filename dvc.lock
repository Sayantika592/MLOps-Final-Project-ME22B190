schema: '2.0'
stages:
  data_ingestion:
    cmd: ./venv/bin/python -c "from src.data.ingest import load_data, 
      load_config, compute_baseline_statistics; import json, os, yaml; params = 
      yaml.safe_load(open('params.yaml')); df = 
      load_data(params['data']['raw_path']); stats = 
      compute_baseline_statistics(df); os.makedirs('data/processed', 
      exist_ok=True); df.to_csv('data/processed/ingested.csv', index=False); 
      json.dump(stats, open('data/processed/baseline_stats.json','w'), 
      indent=2);"
    deps:
    - path: data/raw/news.csv
      hash: md5
      md5: 0423900c49f9584476f8bad4891429ec
      size: 116417694
    - path: src/data/ingest.py
      hash: md5
      md5: ee4831cdd3743bd56ded04efe465fa2d
      size: 4648
    params:
      params.yaml:
        data.raw_path: data/raw/news.csv
    outs:
    - path: data/processed/baseline_stats.json
      hash: md5
      md5: 75cc702f37e2c8832b2d5ba17005c110
      size: 375
    - path: data/processed/ingested.csv
      hash: md5
      md5: 0423900c49f9584476f8bad4891429ec
      size: 116417694
  preprocessing:
    cmd: ./venv/bin/python -c "import pandas as pd; from src.data.preprocess 
      import preprocess_dataframe; df = 
      pd.read_csv('data/processed/ingested.csv'); df = preprocess_dataframe(df);
      df.to_csv('data/processed/preprocessed.csv', index=False);"
    deps:
    - path: data/processed/ingested.csv
      hash: md5
      md5: 0423900c49f9584476f8bad4891429ec
      size: 116417694
    - path: src/data/preprocess.py
      hash: md5
      md5: c8258548903d08e592c12946e2031c72
      size: 5137
    params:
      params.yaml:
        preprocessing:
          max_features: 50000
          ngram_range_min: 1
          ngram_range_max: 2
          min_df: 2
          max_df: 0.95
          stop_words: english
    outs:
    - path: data/processed/preprocessed.csv
      hash: md5
      md5: fca5961c7c612cc9145a17526f756ea4
      size: 337885233
  train:
    cmd: ./venv/bin/python src/pipeline/run_pipeline.py --config 
      configs/model_config.yaml
    deps:
    - path: configs/model_config.yaml
      hash: md5
      md5: 32117854fe0a64f8cd73f3ca0b5645a6
      size: 1108
    - path: data/raw/news.csv
      hash: md5
      md5: 0423900c49f9584476f8bad4891429ec
      size: 116417694
    - path: src/data/ingest.py
      hash: md5
      md5: ee4831cdd3743bd56ded04efe465fa2d
      size: 4648
    - path: src/data/preprocess.py
      hash: md5
      md5: c8258548903d08e592c12946e2031c72
      size: 5137
    - path: src/model/train.py
      hash: md5
      md5: f401d9d42d18879413c9f9085b8c160a
      size: 6886
    - path: src/pipeline/run_pipeline.py
      hash: md5
      md5: 3b77dc4726ad8e635bce222e86a3437b
      size: 9715
    params:
      params.yaml:
        data.random_state: 42
        data.test_size: 0.2
        model:
          algorithm: passive_aggressive
          passive_aggressive:
            max_iter: 50
            C: 1.0
            tol: 0.001
          logistic_regression:
            max_iter: 1000
            C: 1.0
            solver: lbfgs
          random_forest:
            n_estimators: 100
            max_depth: 50
            random_state: 42
        preprocessing.max_features: 50000
        preprocessing.ngram_range_max: 2
        preprocessing.ngram_range_min: 1
