data:
  raw_path: "data/raw/news.csv"
  test_size: 0.2
  random_state: 42

preprocessing:
  max_features: 50000
  ngram_range_min: 1
  ngram_range_max: 2
  min_df: 2
  max_df: 0.95
  stop_words: "english"

model:
  algorithm: "passive_aggressive"
  passive_aggressive:
    max_iter: 50
    C: 1.0
    tol: 0.001
  logistic_regression:
    max_iter: 1000
    C: 1.0
    solver: "lbfgs"
  random_forest:
    n_estimators: 100
    max_depth: 50
    random_state: 42
