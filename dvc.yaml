stages:
  data_ingestion:
    cmd: python -c "
      from src.data.ingest import load_data, load_config, compute_baseline_statistics;
      import json, os;
      config = load_config();
      df = load_data(config['data']['raw_path']);
      stats = compute_baseline_statistics(df);
      os.makedirs('data/processed', exist_ok=True);
      df.to_csv('data/processed/ingested.csv', index=False);
      json.dump(stats, open('data/processed/baseline_stats.json','w'), indent=2);
      "
    deps:
      - data/raw/news.csv
      - src/data/ingest.py
      - configs/model_config.yaml
    outs:
      - data/processed/ingested.csv
      - data/processed/baseline_stats.json

  preprocessing:
    cmd: python -c "
      import pandas as pd;
      from src.data.preprocess import preprocess_dataframe;
      df = pd.read_csv('data/processed/ingested.csv');
      df = preprocess_dataframe(df);
      df.to_csv('data/processed/preprocessed.csv', index=False);
      "
    deps:
      - data/processed/ingested.csv
      - src/data/preprocess.py
    outs:
      - data/processed/preprocessed.csv

  train:
    cmd: python src/pipeline/run_pipeline.py --config configs/model_config.yaml
    deps:
      - data/raw/news.csv
      - src/pipeline/run_pipeline.py
      - src/data/ingest.py
      - src/data/preprocess.py
      - src/model/train.py
      - configs/model_config.yaml
    outs:
      - models/best_model/model.pkl
      - models/best_model/vectorizer.pkl
    metrics:
      - models/best_model/metrics.json:
          cache: false
