version: "3.8"

services:
  # ==========================================================================
  # Backend API (FastAPI + ML Model)
  # ==========================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: fakenews-backend
    ports:
      - "8001:8000"
    volumes:
      - ./models:/app/models
      - ./data/processed:/app/data/processed
      - ./configs:/app/configs
    environment:
      - CONFIG_PATH=configs/model_config.yaml
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - fakenews-network
    restart: unless-stopped

  # ==========================================================================
  # Frontend (Streamlit UI)
  # ==========================================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: fakenews-frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fakenews-network
    restart: unless-stopped

  # ==========================================================================
  # MLflow Tracking Server (A7 requirement)
  # ==========================================================================
  mlflow:
    image: python:3.11-slim
    container_name: fakenews-mlflow
    command: >
      bash -c "pip install mlflow --upgrade --quiet &&
               mlflow server --host 0.0.0.0 --port 5000
               --backend-store-uri sqlite:///mlflow.db
               --default-artifact-root /mlflow/artifacts"
    ports:
      - "5001:5000"
    volumes:
      - mlflow-data:/mlflow
    networks:
      - fakenews-network
    restart: unless-stopped

  # ==========================================================================
  # Prometheus (Metrics Collection — A5 requirement)
  # ==========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: fakenews-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./configs/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    networks:
      - fakenews-network
    restart: unless-stopped

  # ==========================================================================
  # AlertManager (Email Alerts — A5 requirement)
  # ==========================================================================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: fakenews-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./configs/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    networks:
      - fakenews-network
    restart: unless-stopped

  # ==========================================================================
  # Node Exporter (System Metrics — A5 requirement)
  # ==========================================================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: fakenews-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - fakenews-network
    restart: unless-stopped

  # ==========================================================================
  # Grafana (Dashboards — A5 requirement)
  # ==========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: fakenews-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - fakenews-network
    restart: unless-stopped

  # ==========================================================================
  # PostgreSQL (Airflow Metadata Database)
  # ==========================================================================
  postgres:
    image: postgres:13
    container_name: fakenews-postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    command: postgres -c max_connections=200
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fakenews-network
    restart: unless-stopped

  # ==========================================================================
  # Airflow Webserver (A6 requirement)
  # ==========================================================================
  airflow-webserver:
    image: apache/airflow:3.2.0-python3.11
    container_name: fakenews-airflow-webserver
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_SIZE=10
      - AIRFLOW__DATABASE__SQL_ALCHEMY_MAX_OVERFLOW=20
      - AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_RECYCLE=1800
      - AIRFLOW__CORE__FERNET_KEY=ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=True
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__SMTP__SMTP_HOST=sandbox.smtp.mailtrap.io
      - AIRFLOW__SMTP__SMTP_PORT=2525
      - AIRFLOW__SMTP__SMTP_USER=03d947f0b2b667
      - AIRFLOW__SMTP__SMTP_PASSWORD=5b499655df4b6a
      - AIRFLOW__SMTP__SMTP_MAIL_FROM=airflow@fakenews.local
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
      - _PIP_ADDITIONAL_REQUIREMENTS=pandas scikit-learn mlflow pyyaml
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./models:/opt/airflow/models
      - ./configs:/opt/airflow/configs
      - ./params.yaml:/opt/airflow/params.yaml
      - airflow-logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: >
      bash -c "airflow db migrate &&
               (airflow connections add fs_default --conn-type fs --conn-extra '{\"path\": \"/opt/airflow\"}' || true) &&
               (airflow pools set ml_pipeline_pool 3 'Pool for ML pipeline tasks' || true) &&
               airflow api-server --port 8080"
    depends_on:
      - postgres
    networks:
      - fakenews-network
    restart: unless-stopped

  # ==========================================================================
  # Airflow Scheduler
  # ==========================================================================
  airflow-scheduler:
    image: apache/airflow:3.2.0-python3.11
    container_name: fakenews-airflow-scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_SIZE=10
      - AIRFLOW__DATABASE__SQL_ALCHEMY_MAX_OVERFLOW=20
      - AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_RECYCLE=1800
      - AIRFLOW__CORE__FERNET_KEY=ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__SMTP__SMTP_HOST=sandbox.smtp.mailtrap.io
      - AIRFLOW__SMTP__SMTP_PORT=2525
      - AIRFLOW__SMTP__SMTP_USER=03d947f0b2b667
      - AIRFLOW__SMTP__SMTP_PASSWORD=5b499655df4b6a
      - AIRFLOW__SMTP__SMTP_MAIL_FROM=airflow@fakenews.local
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-webserver:8080
      - _PIP_ADDITIONAL_REQUIREMENTS=pandas scikit-learn mlflow pyyaml
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./models:/opt/airflow/models
      - ./configs:/opt/airflow/configs
      - ./params.yaml:/opt/airflow/params.yaml
      - airflow-logs:/opt/airflow/logs
    command: airflow scheduler
    depends_on:
      - airflow-webserver
    networks:
      - fakenews-network
    restart: unless-stopped

  # ==========================================================================
  # Airflow DAG Processor
  # ==========================================================================
  airflow-dag-processor:
    image: apache/airflow:3.2.0-python3.11
    container_name: fakenews-airflow-dag-processor
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_SIZE=10
      - AIRFLOW__DATABASE__SQL_ALCHEMY_MAX_OVERFLOW=20
      - AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_RECYCLE=1800
      - AIRFLOW__CORE__FERNET_KEY=ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-webserver:8080
      - _PIP_ADDITIONAL_REQUIREMENTS=pandas scikit-learn mlflow pyyaml
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./models:/opt/airflow/models
      - ./configs:/opt/airflow/configs
      - ./params.yaml:/opt/airflow/params.yaml
      - airflow-logs:/opt/airflow/logs
    command: airflow dag-processor
    depends_on:
      - airflow-webserver
    networks:
      - fakenews-network
    restart: unless-stopped

volumes:
  mlflow-data:
  prometheus-data:
  grafana-data:
  airflow-logs:
  postgres-data:

networks:
  fakenews-network:
    driver: bridge